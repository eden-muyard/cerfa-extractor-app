services:
  - type: web
    name: cerfa-extractor
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app:app --host 0.0.0.0 --port 10000
    plan: free
    envVars:
      - key: APP_USERNAME
        sync: false
      - key: APP_PASSWORD
        sync: false
      - key: SESSION_SECRET
        sync: false
      - key: MAX_UPLOAD_MB
        value: "15"
      - key: UPLOAD_RETENTION_DAYS
        value: "14"
